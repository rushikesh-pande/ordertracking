# Monitoring Enhancement: Prometheus Alert Rules for ordertracking
# Deploy to AlertManager alongside Prometheus scrape config.
groups:
  - name: ordertracking_alerts
    interval: 30s
    rules:

      # ── High Error Rate ──────────────────────────────────────────────────────
      - alert: HighErrorRate_ordertracking
        expr: |
          rate(ordertracking_errors_total{service="ordertracking"}[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
          service: ordertracking
        annotations:
          summary: "High error rate on {{ $labels.service }}"
          description: "Error rate is {{ $value | humanizePercentage }} on ordertracking"

      # ── High HTTP Latency ────────────────────────────────────────────────────
      - alert: HighLatency_ordertracking
        expr: |
          histogram_quantile(0.95, rate(http_server_requests_seconds_bucket{service="ordertracking"}[5m])) > 2
        for: 5m
        labels:
          severity: warning
          service: ordertracking
        annotations:
          summary: "p95 latency above 2s on ordertracking"
          description: "p95 latency is {{ $value }}s on ordertracking"

      # ── Service Down ─────────────────────────────────────────────────────────
      - alert: ServiceDown_ordertracking
        expr: |
          up{job="ordertracking"} == 0
        for: 1m
        labels:
          severity: critical
          service: ordertracking
        annotations:
          summary: "ordertracking is DOWN"
          description: "ordertracking Prometheus target is not reachable"

      # ── High Heap Memory ─────────────────────────────────────────────────────
      - alert: HighHeapMemory_ordertracking
        expr: |
          (jvm_memory_used_bytes{service="ordertracking",area="heap"} /
           jvm_memory_max_bytes{service="ordertracking",area="heap"}) > 0.85
        for: 5m
        labels:
          severity: warning
          service: ordertracking
        annotations:
          summary: "JVM Heap above 85% on ordertracking"
          description: "Heap usage is {{ $value | humanizePercentage }} on ordertracking"

      # ── Too Many 5xx Responses ───────────────────────────────────────────────
      - alert: High5xxRate_ordertracking
        expr: |
          rate(http_server_requests_seconds_count{service="ordertracking",status=~"5.."}[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
          service: ordertracking
        annotations:
          summary: "High 5xx rate on ordertracking"
          description: "5xx rate is {{ $value | humanize }} req/s on ordertracking"

      # ── High CPU Usage ───────────────────────────────────────────────────────
      - alert: HighCpuUsage_ordertracking
        expr: |
          process_cpu_usage{service="ordertracking"} > 0.80
        for: 5m
        labels:
          severity: warning
          service: ordertracking
        annotations:
          summary: "CPU above 80% on ordertracking"
          description: "CPU usage is {{ $value | humanizePercentage }} on ordertracking"
